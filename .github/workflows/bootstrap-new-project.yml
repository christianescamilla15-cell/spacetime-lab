name: bootstrap-new-project

# Create a brand-new repo from scratch, scaffold it with a chosen
# engine (Claude Code headless OR aider+Ollama), and push the initial
# commit.  Autonomous.
#
# Engines:
#   - claude-code   : uses the locally-installed Claude Code CLI in
#                     headless mode (`claude -p`).  Best quality; runs
#                     under Christian's subscription (zero incremental
#                     $$).  Requires the Claude desktop app installed
#                     and logged in on this PC.
#   - ollama-local  : original path, aider + Ollama model.  Zero-cloud
#                     but lower quality.
#
# Flow:
#   1. gh repo create <user>/<project>  (shell, deterministic)
#   2. clone to %TEMP%\<project>         (shell)
#   3. chosen engine scaffolds the initial files using
#      .agent/workflows/bootstrap-new-project.md as the prompt, with
#      PROJECT_NAME / STACK / PROJECT_DESCRIPTION substituted in
#   4. git add + commit (runner side)
#   5. git push
#   6. optionally: vercel link + first deploy
#   7. log the dispatch event to spacetime-lab/.agent/runs/_summary.jsonl
#
# Trigger from phone via GitHub mobile app, or:
#   gh workflow run bootstrap-new-project.yml \
#      -f project_name=mopras-optimizer \
#      -f stack=python-fastapi \
#      -f description='API que optimiza mis compras semanales' \
#      -f deploy_vercel=false \
#      -f visibility=private

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: "Repo/project name (lowercase, hyphen-separated)"
        required: true
      stack:
        description: "Stack scaffold"
        type: choice
        required: true
        default: python-fastapi
        options:
          - python-fastapi
          - react-vite
          - python-cli
          - streamlit
      description:
        description: "One-line project description"
        required: true
      visibility:
        description: "Repo visibility"
        type: choice
        required: true
        default: private
        options:
          - private
          - public
      deploy_vercel:
        description: "Run vercel link + first deploy after push (react-vite only)"
        type: boolean
        required: true
        default: false
      engine:
        description: "Scaffold engine"
        type: choice
        required: true
        default: claude-code
        options:
          - claude-code
          - ollama-local
      model:
        description: "Ollama model (only used when engine=ollama-local)"
        type: choice
        required: true
        default: ollama/qwen2.5-coder:7b
        options:
          - ollama/qwen2.5-coder:7b
          - ollama/deepseek-r1:8b
          - ollama/llama3.1:8b
          - ollama/gemma3:4b
      timeout_minutes:
        description: "Scaffold timeout"
        type: number
        required: true
        default: 10

jobs:
  bootstrap:
    runs-on: [self-hosted, windows, claude-dispatch]
    timeout-minutes: 20
    defaults:
      run:
        # $ErrorActionPreference='Continue' globally so native commands
        # writing to stderr (git, gh, vercel, aider progress) do NOT
        # trigger PS5.1's NativeCommandError.  Steps still rely on
        # $LASTEXITCODE explicitly for real error detection.
        shell: powershell -NoProfile -Command "$ErrorActionPreference='Continue'; . '{0}'"

    env:
      SPACETIME_LAB_PATH: 'C:\Users\DANNY\Desktop\spacetime-lab'
      OLLAMA_API_BASE: 'http://localhost:11434'
      GH_OWNER: christianescamilla15-cell
      PROJECTS_ROOT: 'C:\Users\DANNY\Desktop\projects'

    steps:
      - name: Show inputs
        run: |
          Write-Host "project_name: ${{ inputs.project_name }}"
          Write-Host "stack       : ${{ inputs.stack }}"
          Write-Host "description : ${{ inputs.description }}"
          Write-Host "visibility  : ${{ inputs.visibility }}"
          Write-Host "engine      : ${{ inputs.engine }}"
          Write-Host "model       : ${{ inputs.model }}"

      - name: Validate project name
        run: |
          $name = '${{ inputs.project_name }}'
          if ($name -notmatch '^[a-z][a-z0-9-]*[a-z0-9]$') {
              Write-Error "project_name must be lowercase, start with a letter, hyphen-separated.  Got: $name"
              exit 1
          }
          New-Item -ItemType Directory -Force -Path $env:PROJECTS_ROOT | Out-Null

      - name: Pull spacetime-lab master (so we have latest workflow prompt)
        run: |
          Set-Location $env:SPACETIME_LAB_PATH
          # cmd /c wraps git so its progress-to-stderr output doesn't
          # trigger PS5.1 NativeCommandError.
          cmd /c "git fetch origin master 2>&1 && git pull --ff-only origin master 2>&1"
          if ($LASTEXITCODE -ne 0) { Write-Host "git pull failed"; exit 1 }

      - name: Verify Ollama is up + model is pulled
        if: ${{ inputs.engine == 'ollama-local' }}
        run: |
          $modelOnly = '${{ inputs.model }}' -replace '^ollama/', ''
          try {
              $r = Invoke-WebRequest -Uri "$env:OLLAMA_API_BASE/api/tags" -UseBasicParsing -TimeoutSec 5
              $body = ConvertFrom-Json $r.Content
              $names = $body.models | ForEach-Object { $_.name }
              if ($names -notcontains $modelOnly) {
                  Write-Error "Model $modelOnly not pulled.  Available: $($names -join ', ')"
                  exit 1
              }
              Write-Host "Ollama OK.  Model $modelOnly ready."
          } catch {
              Write-Error "Ollama unreachable at $env:OLLAMA_API_BASE."
              exit 1
          }

      - name: Create new GitHub repo
        run: |
          $ErrorActionPreference = 'Continue'
          $name = '${{ inputs.project_name }}'
          $full = "$env:GH_OWNER/$name"
          Write-Host "Creating $full ..."
          # gh repo view writes to stderr when the repo does not exist;
          # PS5.1 treats native stderr as error unless we relax above.
          # We rely on $LASTEXITCODE (0 = exists, non-0 = doesn't), and
          # swallow stderr via 2>$null since the not-found message is
          # informational noise in that path.
          & gh repo view $full 2>$null 1>$null
          if ($LASTEXITCODE -eq 0) {
              Write-Host "ERROR: Repo $full already exists.  Pick a different project_name or delete it first."
              exit 1
          }
          & gh repo create $full --${{ inputs.visibility }} --add-readme `
              --description '${{ inputs.description }}' 2>&1 | Out-Host
          if ($LASTEXITCODE -ne 0) {
              Write-Host "ERROR: gh repo create failed (exit $LASTEXITCODE)"
              exit 1
          }
          Write-Host "Repo created: https://github.com/$full"

      - name: Clone repo locally
        run: |
          $name = '${{ inputs.project_name }}'
          $dest = Join-Path $env:PROJECTS_ROOT $name
          if (Test-Path $dest) {
              Write-Host "Removing existing $dest"
              Remove-Item -Recurse -Force $dest
          }
          $url = "https://github.com/$env:GH_OWNER/$name.git"
          cmd /c "git clone $url `"$dest`" 2>&1"
          if ($LASTEXITCODE -ne 0) { Write-Host "clone failed"; exit 1 }
          Write-Host "Cloned to $dest"

      - name: Aider scaffold (ollama-local engine)
        if: ${{ inputs.engine == 'ollama-local' }}
        continue-on-error: true
        timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
        run: |
          $ErrorActionPreference = 'Continue'
          Set-Location $env:SPACETIME_LAB_PATH
          $target = Join-Path $env:PROJECTS_ROOT '${{ inputs.project_name }}'
          & python .agent\_wrapper\track_usage.py `
              --executor aider `
              --model '${{ inputs.model }}' `
              --repo-path $target `
              --context-var "PROJECT_NAME=${{ inputs.project_name }}" `
              --context-var "STACK=${{ inputs.stack }}" `
              --context-var "PROJECT_DESCRIPTION=${{ inputs.description }}" `
              bootstrap-new-project `
              -- --auto-commits 2>&1 | Out-Host
          Write-Host "track_usage.py exit: $LASTEXITCODE"

      - name: Claude Code scaffold (claude-code engine)
        if: ${{ inputs.engine == 'claude-code' }}
        continue-on-error: true
        timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
        run: |
          $ErrorActionPreference = 'Continue'
          $target = Join-Path $env:PROJECTS_ROOT '${{ inputs.project_name }}'

          # Resolve claude.exe from the Appx install (version-agnostic).
          $claudeRoot = 'C:\Users\DANNY\AppData\Local\Packages\Claude_pzs8sxrjxfjjc\LocalCache\Roaming\Claude\claude-code'
          $claudeExe = Get-ChildItem -Path $claudeRoot -Filter 'claude.exe' -Recurse -ErrorAction SilentlyContinue |
                       Sort-Object FullName -Descending |
                       Select-Object -First 1 -ExpandProperty FullName
          if (-not $claudeExe) {
              Write-Error "claude.exe not found under $claudeRoot -- is Claude Code installed?"
              exit 1
          }
          Write-Host "Using: $claudeExe"

          # Render the scaffold prompt with input substitutions.
          $promptTpl = Join-Path $env:SPACETIME_LAB_PATH '.agent\workflows\bootstrap-new-project.md'
          $prompt = Get-Content -Raw -Path $promptTpl
          $prompt = $prompt.Replace('{{PROJECT_NAME}}',        '${{ inputs.project_name }}')
          $prompt = $prompt.Replace('{{STACK}}',               '${{ inputs.stack }}')
          $prompt = $prompt.Replace('{{PROJECT_DESCRIPTION}}', '${{ inputs.description }}')

          # Write to a temp file so we can pipe it via stdin deterministically.
          $promptFile = Join-Path $env:TEMP ("scaffold-prompt-{0}.md" -f [guid]::NewGuid())
          Set-Content -Path $promptFile -Value $prompt -Encoding UTF8
          Write-Host "--- rendered prompt ($promptFile) ---"
          Get-Content $promptFile -TotalCount 15
          Write-Host "--- end preview ---"

          Set-Location $target
          # Headless: claude -p reads prompt from stdin, auto-accepts file edits.
          Get-Content -Raw $promptFile | & $claudeExe -p `
              --permission-mode acceptEdits `
              --output-format text 2>&1 | Out-Host
          Write-Host "claude exit: $LASTEXITCODE"
          Remove-Item -Path $promptFile -ErrorAction SilentlyContinue

      - name: Summarize files created + commit + push
        run: |
          $target = Join-Path $env:PROJECTS_ROOT '${{ inputs.project_name }}'
          Set-Location $target
          Write-Host "--- Files in the new repo ---"
          cmd /c "git ls-files 2>&1"
          Write-Host "--- Git status ---"
          cmd /c "git status --short 2>&1"
          Write-Host "--- Git log (before runner commit) ---"
          cmd /c "git log --oneline 2>&1"
          # If aider ran, exclude its conversation artifacts from the scaffold.
          if ('${{ inputs.engine }}' -eq 'ollama-local') {
              $gi = Join-Path $target '.gitignore'
              $aiderIgn = "`n# Aider conversation artifacts`n.aider*`n"
              Add-Content -Path $gi -Value $aiderIgn -Encoding UTF8
              cmd /c "git rm --cached -r --ignore-unmatch .aider.chat.history.md .aider.input.history .aider.tags.cache.v4 2>&1"
          }
          # Now commit everything aider produced + our .gitignore fix.
          cmd /c "git add -A 2>&1"
          cmd /c "git diff --cached --quiet 2>&1"
          $stagedExit = $LASTEXITCODE
          if ($stagedExit -ne 0) {
              $msg = "feat: initial scaffold for ${{ inputs.project_name }} (${{ inputs.stack }})"
              cmd /c "git -c user.email=dispatch-runner@local -c user.name=runner-desktop commit -m `"$msg`" --no-verify 2>&1"
          } else {
              Write-Host "(aider left no uncommitted changes to pick up)"
          }
          # Detect default branch; gh repo create --add-readme uses 'main'
          # but older repos may still have 'master'.
          $branch = (cmd /c "git rev-parse --abbrev-ref HEAD 2>&1").Trim()
          Write-Host "Pushing branch: $branch"
          cmd /c "git push origin $branch 2>&1"
          Write-Host "push exit: $LASTEXITCODE"
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Optional vercel deploy (react-vite only)
        if: ${{ inputs.deploy_vercel == true && inputs.stack == 'react-vite' }}
        continue-on-error: true
        run: |
          $target = Join-Path $env:PROJECTS_ROOT '${{ inputs.project_name }}'
          Set-Location $target
          Write-Host "Linking with Vercel..."
          & vercel link --yes --project '${{ inputs.project_name }}' 2>&1 | Out-Host
          Write-Host "Deploying..."
          & vercel --prod --yes 2>&1 | Out-Host

      - name: Log dispatch to spacetime-lab/.agent/runs/_summary.jsonl
        run: |
          $ErrorActionPreference = 'Continue'
          Set-Location $env:SPACETIME_LAB_PATH
          $now = (Get-Date).ToUniversalTime()
          $engine = '${{ inputs.engine }}'
          if ($engine -eq 'claude-code') {
              $executor = 'claude-code'
              $modelField = 'claude-code-default'
          } else {
              $executor = 'aider'
              $modelField = '${{ inputs.model }}'
          }
          $entry = [ordered]@{
              run_id     = $now.ToString("yyyyMMddTHHmmssZ") + "_bootstrap"
              workflow   = "bootstrap-new-project"
              executor   = $executor
              engine     = $engine
              model      = $modelField
              project    = '${{ inputs.project_name }}'
              stack      = '${{ inputs.stack }}'
              visibility = '${{ inputs.visibility }}'
              start      = $now.ToString("yyyy-MM-ddTHH:mm:ssZ")
              end        = $now.ToString("yyyy-MM-ddTHH:mm:ssZ")
              kind       = "bootstrap-new-project"
              repo_url   = "https://github.com/$env:GH_OWNER/${{ inputs.project_name }}"
          }
          $json = $entry | ConvertTo-Json -Depth 6 -Compress
          $out = Join-Path $env:SPACETIME_LAB_PATH '.agent\runs\_summary.jsonl'
          Add-Content -Path $out -Value $json -Encoding UTF8

          # Render LATEST.md briefing for the next interactive session.
          & python .agent\_wrapper\write_latest.py 2>&1 | Out-Host

          cmd /c "git add .agent/runs/_summary.jsonl .agent/runs/LATEST.md 2>&1"
          cmd /c "git diff --cached --quiet 2>&1"
          if ($LASTEXITCODE -ne 0) {
              $msg = "chore(bootstrap): ${{ inputs.project_name }} (${{ inputs.stack }})"
              cmd /c "git -c user.email=dispatch-runner@local -c user.name=runner-desktop commit -m `"$msg`" --no-verify 2>&1"
              cmd /c "git push origin master 2>&1"
          }
          exit 0

      - name: Summary
        run: |
          Write-Host "=== bootstrap-new-project complete ==="
          Write-Host "  project: https://github.com/$env:GH_OWNER/${{ inputs.project_name }}"
          Write-Host "  local:   $env:PROJECTS_ROOT\${{ inputs.project_name }}"
          Write-Host "  stack:   ${{ inputs.stack }}"
