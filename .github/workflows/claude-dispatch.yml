name: claude-dispatch

# Phone → GitHub Actions → self-hosted runner (this PC) → prepare workspace.
# The runner does NO LLM calls; it arranges the environment so that when
# Christian arrives at the PC, Antigravity is already focused on the right
# workflow with the relevant dashboards open in Chrome.  Actual agent work
# happens interactively in the IDE afterward.
#
# Trigger from:
#   - GitHub mobile app (Actions tab → "Run workflow")
#   - gh CLI: gh workflow run claude-dispatch.yml -f workflow=check-deploys

on:
  workflow_dispatch:
    inputs:
      workflow:
        description: "Workflow slug (from .agent/workflows/)"
        type: choice
        required: true
        default: check-deploys
        options:
          - check-deploys
          - ship-patch
          - verify-before-code
      task:
        description: "Plain-text task context (optional, becomes the first prompt)"
        required: false
        default: ""
      open_ide:
        description: "Open Antigravity IDE on the workflow file"
        type: boolean
        required: true
        default: true
      open_dashboards:
        description: "Open deploy dashboards in Chrome (via CDP :9222)"
        type: boolean
        required: true
        default: false

jobs:
  dispatch:
    runs-on: [self-hosted, windows, claude-dispatch]
    defaults:
      run:
        shell: powershell

    env:
      REPO_PATH: 'C:\Users\DANNY\Desktop\spacetime-lab'
      ANTIGRAVITY_CMD: 'C:\Users\DANNY\AppData\Local\Programs\Antigravity\bin\antigravity.cmd'

    steps:
      - name: Show inputs
        run: |
          Write-Host "workflow         : ${{ inputs.workflow }}"
          Write-Host "task             : ${{ inputs.task }}"
          Write-Host "open_ide         : ${{ inputs.open_ide }}"
          Write-Host "open_dashboards  : ${{ inputs.open_dashboards }}"

      - name: Pull latest master in the repo on this PC
        run: |
          Set-Location $env:REPO_PATH
          git fetch origin master
          git checkout master
          git pull --ff-only origin master

      - name: Verify the selected workflow file exists
        run: |
          $wf = Join-Path $env:REPO_PATH ".agent\workflows\${{ inputs.workflow }}.md"
          if (-not (Test-Path $wf)) {
              Write-Error "workflow file missing: $wf"
              exit 1
          }
          Write-Host "--- $wf ---"
          Get-Content $wf -TotalCount 40

      - name: Verify CDP (:9222) is available
        if: ${{ inputs.open_dashboards == true }}
        continue-on-error: true
        run: |
          try {
              $r = Invoke-WebRequest -Uri 'http://localhost:9222/json/version' -UseBasicParsing -TimeoutSec 3
              if ($r.StatusCode -ne 200) { throw "status $($r.StatusCode)" }
              Write-Host "CDP OK: $((ConvertFrom-Json $r.Content).Browser)"
          } catch {
              Write-Warning "Chrome DevTools Protocol on :9222 not available. Is Antigravity running?"
              Write-Warning "Dashboards step will skip."
              exit 1
          }

      - name: Open deploy dashboards via CDP
        if: ${{ inputs.open_dashboards == true }}
        continue-on-error: true
        run: |
          $tabs = @(
              'https://github.com/christianescamilla15-cell/spacetime-lab/actions',
              'https://github.com/christianescamilla15-cell/spacetime-lab/releases',
              'https://spacetime-lab.vercel.app'
          )
          $opened = 0
          foreach ($url in $tabs) {
              try {
                  $enc = [uri]::EscapeDataString($url)
                  $r = Invoke-WebRequest -Method Put -Uri "http://localhost:9222/json/new?$enc" -UseBasicParsing -TimeoutSec 5
                  $tab = ConvertFrom-Json $r.Content
                  Write-Host "  $($tab.id)  $url"
                  $opened++
              } catch {
                  Write-Warning "  failed to open $url : $_"
              }
          }
          Write-Host "Opened $opened / $($tabs.Count) dashboards."

      - name: Open Antigravity IDE on the workflow file
        if: ${{ inputs.open_ide == true }}
        run: |
          $wf = ".agent\workflows\${{ inputs.workflow }}.md:1"
          Write-Host "Launching Antigravity focused on $wf"
          Start-Process -FilePath $env:ANTIGRAVITY_CMD `
              -ArgumentList @($env:REPO_PATH, '--goto', $wf, '--reuse-window') `
              -WorkingDirectory $env:REPO_PATH

      - name: Record dispatch event to .agent/runs/_summary.jsonl
        run: |
          Set-Location $env:REPO_PATH
          $now = (Get-Date).ToUniversalTime()
          $iso = $now.ToString("yyyy-MM-ddTHH:mm:ssZ")
          $runId = $now.ToString("yyyyMMddTHHmmssZ") + "_dispatch"
          $entry = [ordered]@{
              run_id     = $runId
              workflow   = '${{ inputs.workflow }}'
              task       = '${{ inputs.task }}'
              kind       = 'dispatch-prepare'
              start      = $iso
              end        = $iso
              duration_s = 0
              exit_code  = 0
              inputs     = @{
                  open_ide        = [System.Convert]::ToBoolean('${{ inputs.open_ide }}')
                  open_dashboards = [System.Convert]::ToBoolean('${{ inputs.open_dashboards }}')
              }
              usage      = @{}
          }
          $json = $entry | ConvertTo-Json -Depth 6 -Compress
          $out = Join-Path $env:REPO_PATH '.agent\runs\_summary.jsonl'
          New-Item -ItemType Directory -Force -Path (Split-Path $out) | Out-Null
          Add-Content -Path $out -Value $json -Encoding UTF8
          Write-Host "logged: $runId"
          Write-Host $json

      - name: Write .agent/runs/LATEST.md briefing
        run: |
          Set-Location $env:REPO_PATH
          & python .agent\_wrapper\write_latest.py 2>&1 | Out-Host

      - name: Persist dispatch log to origin
        # Auto-commits the appended _summary.jsonl line so dispatch history
        # is durable across machines / runner reinstalls.  Uses a local
        # identity scoped to this run only.  If there's nothing to commit
        # (edge case: previous step failed before Add-Content) we exit
        # successfully.
        #
        # Note: PowerShell 5.1 treats any stderr output from a native
        # command as an error, and git writes progress to stderr, so we
        # need $ErrorActionPreference = 'Continue' and merge stderr
        # explicitly before checking $LASTEXITCODE.
        run: |
          $ErrorActionPreference = 'Continue'
          Set-Location $env:REPO_PATH

          & git add .agent/runs/_summary.jsonl .agent/runs/LATEST.md 2>&1 | Out-Host
          & git diff --cached --quiet 2>&1 | Out-Host
          if ($LASTEXITCODE -eq 0) {
              Write-Host "Nothing to commit (summary.jsonl unchanged)."
              exit 0
          }

          $runMsg = "chore(dispatch): log run ${{ github.run_id }} workflow=${{ inputs.workflow }}"
          & git -c user.email='dispatch-runner@local' `
                -c user.name='runner-desktop' `
                commit -m "$runMsg" --no-verify 2>&1 | Out-Host
          if ($LASTEXITCODE -ne 0) {
              Write-Warning "git commit failed; aborting push"
              exit 0
          }

          # Push with retry-on-race: if another dispatch pushed first,
          # rebase the log-only commit on top and try again.  Up to 3
          # attempts before giving up (the log entry stays committed
          # locally in any case, next dispatch will push both).
          $pushed = $false
          for ($i = 1; $i -le 3; $i++) {
              & git push origin master 2>&1 | Out-Host
              if ($LASTEXITCODE -eq 0) {
                  Write-Host "push succeeded on attempt $i"
                  $pushed = $true
                  break
              }
              Write-Host "push attempt $i returned exit $LASTEXITCODE, rebasing and retrying"
              & git fetch origin master 2>&1 | Out-Host
              & git rebase origin/master 2>&1 | Out-Host
          }
          if (-not $pushed) {
              Write-Host "could not push dispatch log after 3 tries; entry stays committed locally."
          }
          # Always succeed: the log entry was written, push is best-effort.
          exit 0

      - name: Summary
        run: |
          Write-Host "=== dispatch complete ==="
          Write-Host "When you arrive at the PC:"
          Write-Host "  - Antigravity focused on .agent/workflows/${{ inputs.workflow }}.md"
          Write-Host "  - Dashboards: ${{ inputs.open_dashboards == true && 'opened in Chrome' || 'skipped' }}"
          Write-Host "  - Run summary appended to .agent/runs/_summary.jsonl"
